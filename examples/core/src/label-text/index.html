<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文本标签 - MapOrbis</title>
  <link rel="stylesheet" href="../../../shared/styles/orbisstyle.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    .demo-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 300px;
      z-index: 1000;
    }
  </style>
</head>
<body class="orbis-body">
  <div id="map"></div>

  <div class="demo-panel">
    <div class="orbis-panel orbis-shadow-lg">
      <div class="orbis-panel-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 15px; font-weight: 600;">
          <i class="fas fa-font" style="color: var(--orbis-blue)"></i>
          文本标签
        </h3>
        <button class="orbis-toggle" id="themeToggle" title="切换暗黑模式">
          <i class="fas fa-moon"></i>
        </button>
      </div>
      <div class="orbis-panel-body">
        <div class="orbis-status-card">
          <div class="orbis-status-title">标签状态</div>
          <div class="orbis-status-indicator">
            <span class="orbis-indicator orbis-indicator-active"></span>
            <div class="orbis-status-content">Canvas 文本标签</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.171.0/build/three.module.js"
      }
    }
  </script>

  <script src="/utils/inline-utils.js"></script>

  <script type="module">
    import * as maporbis from "@maporbis/core";

    const map = new maporbis.Map("map", {
      state: {
        center: [116.4, 39.9, 2000],
      },
      source: {
        minLevel: 2,
        maxLevel: 19,
        baseLayers: [
          new maporbis.WMTSTileLayer("esri_imagery", {
            source: new maporbis.TileSource({
              url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{{y}/{x}",
              projectionID: "3857",
            }),
            projection: maporbis.ProjectionFactory.create("3857"),
            opacity: 1.0,
            visible: true,
            altitude: 1,
          }),
        ],
      },
      renderer: {
        stats: true,
        antialias: true,
        skybox: {
          hdr: "/assets/image/hdr/kloofendal_48d_partly_cloudy_puresky_2k.hdr",
          hdrExposure: 1,
          defaultColor: "#B9D4FE",
        },
        minDistance: 20,
        maxDistance: 80000,
        defaultGround: {
          enabled: false,
          visible: true,
          color: "#ff0000",
          opacity: 1,
        },
      },
      camera: {
        pitch: 60,
        bearing: 0,
      },
    });

    map.on("load", () => {
      notify("文本标签已添加", "success");

      const label = new maporbis.Label({
        geometry: {
          type: "Point",
          coordinates: [116.4, 39.9, 50],
        },
        paint: {
          type: "text-fixed",
          text: "Hello maporbis",
          fontSizeDpi: 48,
          fontFamily: "Arial, sans-serif",
          fontWeight: "bold",
          textColor: "#ffffff",
          strokeColor: "#000000",
          strokeWidth: 3,
          showBackground: true,
          bgColor: "#ff5722",
          bgOpacity: 0.9,
          screenSpaceSize: 50,
        },
      });

      const labelLayer = new maporbis.PointLayer("labels", {
        altitude: 10,
      });

      map.addLayer(labelLayer);
      label.addTo(labelLayer);
    });
  </script>
</body>
</html>
